<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ficha de Qualificação</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
</head>

<body>
  <div class="container">
    <h2>Ficha de Qualificação</h2>

    <label for="fotoInput" class="botaoFotoLabel">📷 Toque para carregar foto</label>
    <input type="file" id="fotoInput" accept="image/*" style="display:none;"><br>

    <input type="text" id="nomeInput" placeholder="Nome completo"><br>
    <input type="text" id="nascimentoInput" placeholder="Data de nascimento"><br>
    <input type="text" id="naturalidadeInput" placeholder="Naturalidade"><br>
    <input type="text" id="rgInput" placeholder="RG / CPF"><br>
    <input type="text" id="enderecoInput" placeholder="Endereço do Preso"><br>
    <input type="text" id="localInput" placeholder="Endereço do Fato"><br>
    <input type="text" id="codigodeocorrenciaInput" placeholder="Tipo de Ocorrência"><br>
    <input type="text" id="vulgoInput" placeholder="Vulgo"><br>
    <input type="text" id="distritoInput" placeholder="Distrito Policial"><br>
    <input type="text" id="equipeInput" placeholder="Equipe"><br>
    <input type="text" id="bopmInput" placeholder="BOPM Nº"><br>
    <input type="text" id="bopcInput" placeholder="BOPC Nº"><br>
    <input type="text" id="flagranteInput" placeholder="Flagrante ou Abordagem"><br>
    <input type="text" id="datafatoInput" placeholder="Data do Fato"><br>

    <div class="logos">
      <button type="button" data-logo="imagens/brasao-pmesp.png">PMESP</button>
      <button type="button" data-logo="imagens/brasao-ft.png">FT</button>
      <button type="button" data-logo="imagens/brasao-baep.png">BAEP</button>
      <button type="button" data-logo="imagens/brasao-rocam.png">ROCAM</button>
    </div>

    <button type="button" onclick="baixarFicha()" id="btnBaixar">Baixar Ficha</button>
    <button type="button" onclick="limparFormulario()">Limpar Tudo</button>

    <div id="loading" style="display:none;">⏳ Gerando download...</div>
  </div>

  <div class="ficha" id="ficha">
    <img id="foto" src="" alt="Foto do indivíduo">
    <h1 id="qpae">Ficha de Qualificação</h1>

    <img id="brasao" class="brasao" alt="Logo selecionada">

    <div class="campo1">
      <div id="nome" class="campo">NOME COMPLETO:</div>
      <div id="nascimento" class="campo">DATA DE NASCIMENTO:</div>

      <div id="endereco" class="campo">ENDEREÇO DO PRESO:</div>
      <div id="local" class="campo">ENDEREÇO DOS FATOS:</div>

      <div class="linha-dupla">
        <div id="naturalidade" class="campo">NATURAL DE:</div>
        <div id="rg" class="campo">RG / CPF:</div>
      </div>

      <div class="linha-dupla">
        <div id="codigodeocorrencia" class="campo">TIPO DE OCORRÊNCIA:</div>
        <div id="vulgo" class="campo">VULGO:</div>
      </div>

      <div class="linha-dupla">
        <div id="distrito" class="campo">DISTRITO:</div>
        <div id="equipe" class="campo">EQUIPE:</div>
      </div>

      <div class="linha-dupla">
        <div id="bopm" class="campo">BOPM Nº:</div>
        <div id="bopc" class="campo">BOPC Nº:</div>
      </div>

      <div class="linha-dupla">
        <div id="flagrante" class="campo">FLAGRANTE / ABORDAGEM:</div>
        <div id="datafato" class="campo">DATA FATO:</div>
      </div>
    </div>
  </div>

  <!-- ✅ exportArea TEM que ficar dentro do body -->
  <div id="exportArea" style="
    position: fixed;
    left: -10000px;
    top: 0;
    width: 900px;
    background: #fff;
    z-index: -1;">
  </div>

  <!-- ✅ html2canvas UMA vez -->
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

  <!-- ✅ seu JS UMA vez -->
  <script src="script.js"></script>
</body>
</html>
